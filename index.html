<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Chat</title>
    <style>
        /* CSS: Estilização da página */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fundo escuro atrás do chat para dar destaque */
            background-color: #d1d7db;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            /* Cor de fundo característica das conversas */
            background-color: #efeae2;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Cabeçalho verde do topo */
        .chat-header {
            background-color: #075e54;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: #ccc;
            border-radius: 50%;
        }

        .chat-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-info p {
            font-size: 12px;
            color: #d1d7db;
            margin-top: 2px;
        }

        /* Área onde as mensagens ficam */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Estilo base das bolhas de mensagem */
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        /* Mensagens que você recebe (brancas, à esquerda) */
        .message.received {
            background-color: #ffffff;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        /* Mensagens que você envia (verdes, à direita) */
        .message.sent {
            background-color: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        /* Área de digitar mensagem na parte inferior */
        .chat-input-area {
            background-color: #f0f0f0;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }

        .chat-input-area button {
            background-color: #128c7e;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #075e54;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar"></div>
            <div class="chat-info">
                <h3>Nome do Contato</h3>
                <p>online</p>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages">
            <div class="message received">Olá! Como posso te ajudar hoje?</div>
            <div class="message sent">Oi! Gostaria de testar esse chat.</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Mensagem" autocomplete="off" />
            <button id="send-button">➔</button>
        </div>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔴 COLE AQUI O SEU CONFIG DO FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  databaseURL: "SUA_DATABASE_URL",
  projectId: "SEU_PROJECT_ID"
};

// inicia firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// elementos
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const chatMessages = document.getElementById('chat-messages');

// ✅ ENVIAR mensagem
function sendMessage() {
    const text = messageInput.value.trim();

    if (text !== "") {
        push(ref(db, "mensagens"), {
            texto: text
        });

        messageInput.value = "";
    }
}

// ✅ RECEBER mensagem (tempo real)
onChildAdded(ref(db, "mensagens"), (data) => {
    const msg = data.val().texto;

    const messageElement = document.createElement('div');
    messageElement.classList.add('message', 'received');
    messageElement.textContent = msg;

    chatMessages.appendChild(messageElement);
});

// eventos
sendButton.addEventListener('click', sendMessage);

messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});

        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatMessages = document.getElementById('chat-messages');

        // Função para criar e enviar a mensagem
        function sendMessage() {
            const text = messageInput.value.trim();
            
            // Só envia se o campo não estiver vazio
            if (text !== '') {
                // Cria uma nova div para a mensagem
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', 'sent'); // Define como mensagem enviada
                messageElement.textContent = text;

                // Adiciona a mensagem na tela
                chatMessages.appendChild(messageElement);

                // Limpa a caixa de texto
                messageInput.value = '';

                // Rola a tela de mensagens automaticamente para o final
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        // Escuta o clique no botão de enviar
        sendButton.addEventListener('click', sendMessage);

        // Escuta a tecla "Enter" no teclado para enviar também
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
